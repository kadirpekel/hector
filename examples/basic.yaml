# Hector Agent - Basic Example
# Minimal configuration with smart defaults and tool support

agent:
  name: "Hector Basic"
  description: "Basic AI agent with tool support"

# Root-level defaults (inherited by all steps unless overridden)
llm:
  name: "openai"
  api_key: "YOUR_OPENAI_API_KEY_HERE"
  # model, temperature, max_tokens use provider defaults

# Global MCP Tool Integration
mcp_servers:
  - name: "composio"
    url: "https://apollo.composio.dev/v3/mcp/"
    description: "Weather and web search tools"
    config:
      api_key: "YOUR_COMPOSIO_API_KEY_HERE"

# Global document models
models:
  - name: "documents"
    collection: "documents"
    # default_top_k, max_top_k use system defaults

workflow:
  max_steps: 1
  verbose: true
  
  steps:
    - name: "main"
      type: "execute"
      enabled: true
      # This step inherits root-level llm config
      # No agent_config needed - uses inheritance