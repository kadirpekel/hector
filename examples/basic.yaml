# Hector Agent - Basic Example (Workflow-First Architecture)
# Covers minimal setup with tool support

agent:
  name: "Hector Basic"
  description: "Basic AI agent with tool support"

# Global MCP Tool Integration
mcp_servers:
  - name: "composio"
    url: "https://apollo.composio.dev/v3/mcp/"
    description: "Weather and web search tools"
    config:
      api_key: "YOUR_COMPOSIO_API_KEY_HERE"

# Global document models
models:
  - name: "documents"
    collection: "documents"
    default_top_k: 10
    max_top_k: 100

workflow:
  max_steps: 1
  verbose: true
  
  steps:
    - name: "main"
      type: "execute"
      enabled: true
      agent_config:
        agent:
          name: "Main Agent"
          description: "Primary agent with tool support"
        llm:
          name: "openai"
          api_key: "YOUR_OPENAI_API_KEY_HERE"
          model: "gpt-4o-mini"
          temperature: 0.7
          max_tokens: 2000
        reasoning:
          max_iterations: 3
          enable_meta_reasoning: true
          enable_dynamic_tools: true
          quality_threshold: 0.8