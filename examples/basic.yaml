# Hector Agent - Basic Example
# Basic configuration with tools and smart reasoning

agent:
  name: "Hector Basic"
  description: "Basic AI agent with tool support and intelligent reasoning"

# LLM Configuration
llm:
  name: "openai"
  api_key: "YOUR_OPENAI_API_KEY_HERE"
  model: "gpt-4o-mini"  # Fast and cost-effective
  temperature: 0.7

# Tool Integration via MCP
mcp_servers:
  - name: "composio"
    url: "https://apollo.composio.dev/v3/mcp/"
    description: "Weather, web search, and productivity tools"
    config:
      api_key: "YOUR_COMPOSIO_API_KEY_HERE"

# Document Support
models:
  - name: "documents"
    collection: "documents"
    default_top_k: 5

# Intelligent Reasoning - AI selects optimal strategy
reasoning:
  max_iterations: 5
  enable_meta_reasoning: true
  enable_dynamic_tools: true
  quality_threshold: 0.7

# Single-step workflow with inheritance
workflow:
  max_steps: 1
  verbose: true
  steps:
    - name: "main"
      type: "execute"
      # Inherits all root-level configurations