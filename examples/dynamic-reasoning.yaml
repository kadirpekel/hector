# Hector Agent - Dynamic Reasoning Example
# AI-driven adaptive reasoning for complex problems

agent:
  name: "Hector Dynamic"
  description: "AI agent with fully adaptive, self-directed reasoning"

# Configuration optimized for creative reasoning
llm:
  name: "openai"
  api_key: "YOUR_OPENAI_API_KEY_HERE"
  model: "gpt-4o"
  temperature: 0.8  # Higher creativity for dynamic reasoning

memory:
  name: "qdrant"

embedder:
  name: "ollama"

# Enhanced search for complex queries
search:
  max_context_length: 4000
  context_strategy: "relevance"
  enable_reranking: true

# Document support for research
models:
  - name: "knowledge"
    collection: "knowledge_base"
    default_top_k: 15

# Dynamic AI-Driven Reasoning
reasoning:
  max_iterations: 20              # Allow extensive reasoning
  goal_threshold: 0.9             # High goal achievement bar
  adaptation_threshold: 0.3       # Adapt approach when needed
  quality_threshold: 0.75         # Maintain quality standards
  
  # Enable all AI-driven features
  enable_self_reflection: true    # AI evaluates its own work
  enable_meta_reasoning: true     # AI reasons about reasoning
  enable_dynamic_tools: true      # AI selects tools as needed
  enable_goal_evolution: true     # Goals can evolve during execution
  
  streaming_mode: "all_steps"     # Stream the reasoning process

# Single agent with maximum autonomy
workflow:
  max_steps: 1
  verbose: true
  steps:
    - name: "dynamic_agent"
      type: "execute"
      # Uses root-level configuration with dynamic reasoning

# Perfect for queries like:
# - "Design a sustainable city of the future"
# - "Create a comprehensive climate action plan"
# - "Develop a novel approach to education reform"
# - "Analyze the implications of quantum computing on society"
