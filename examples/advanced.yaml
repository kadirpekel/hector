# Hector Agent - Advanced Example
# Multi-step workflow with step-level overrides and nested agents

agent:
  name: "Hector Advanced"
  description: "Advanced AI agent with multi-step reasoning and tool integration"

# Root-level defaults (inherited by all steps unless overridden)
llm:
  name: "openai"
  api_key: "YOUR_OPENAI_API_KEY_HERE"
  # Provider will set: model="gpt-3.5-turbo", temperature=0.7, max_tokens=1000

memory:
  name: "qdrant"
  # Provider will set: host="localhost", port=6334, timeout=30, etc.

embedder:
  name: "ollama"
  # Provider will set: model="nomic-embed-text", host="http://localhost:11434", etc.

# Global MCP Servers Configuration
mcp_servers:
  - name: "composio"
    url: "https://apollo.composio.dev/v3/mcp/..."
    description: "Weather and web search tools"
    config:
      api_key: "YOUR_COMPOSIO_API_KEY_HERE"

# Global document models
models:
  - name: "document"
    collection: "documents"
    # Uses system defaults for top_k values

# Advanced Multi-Step Workflow
workflow:
  max_steps: 4
  verbose: true
  
  steps:
    - name: "research_coordinator"
      type: "analyze"
      enabled: true
      agent_config:
        agent:
          name: "Research Coordinator"
          description: "Coordinates research activities and delegates to specialized agents"
        # Inherits root-level llm, memory, embedder configs
        llm:
          # Override just the temperature for this step
          temperature: 0.2
          max_tokens: 1000
        reasoning:
          max_iterations: 5
          enable_meta_reasoning: true
          enable_self_reflection: true
          enable_dynamic_tools: true
          quality_threshold: 0.8
        # Nested workflow for this agent
        workflow:
          max_steps: 2
          steps:
            - name: "data_collector"
              type: "execute"
              enabled: true
              agent_config:
                agent:
                  name: "Data Collector"
                  description: "Collects data from various sources"
                # Inherits parent's LLM config but overrides temperature
                llm:
                  temperature: 0.3
                reasoning:
                  max_iterations: 3
                  enable_dynamic_tools: true
                  quality_threshold: 0.7
            
            - name: "data_analyzer"
              type: "analyze"
              enabled: true
              agent_config:
                agent:
                  name: "Data Analyzer"
                  description: "Analyzes collected data for patterns and insights"
                llm:
                  temperature: 0.2
                  max_tokens: 1500
                reasoning:
                  max_iterations: 4
                  enable_meta_reasoning: true
                  enable_self_reflection: true
                  quality_threshold: 0.8
    
    - name: "synthesis_agent"
      type: "analyze"
      enabled: true
      agent_config:
        agent:
          name: "Synthesis Agent"
          description: "Synthesizes findings from research coordinator into final response"
        llm:
          temperature: 0.4
          max_tokens: 2000
        reasoning:
          max_iterations: 3
          enable_meta_reasoning: true
          quality_threshold: 0.8