# Hector Agent - Auto Mode Example
# Demonstrates intelligent mode selection based on query analysis

agent:
  name: "Hector Auto"
  description: "AI agent with intelligent mode selection - automatically chooses the best reasoning strategy"

llm:
  name: "openai"
  api_key: "YOUR_OPENAI_API_KEY_HERE"
  model: "gpt-4o-mini"
  temperature: 0.3
  max_tokens: 1500

memory:
  name: "qdrant"
  host: "localhost"
  port: 6334
  timeout: 30
  use_tls: false
  insecure: false

embedder:
  name: "ollama"
  model: "nomic-embed-text"
  host: "http://localhost:11434"
  dimension: 768
  timeout: 30
  max_retries: 3

search:
  max_context_length: 2000
  context_strategy: "relevance"
  enable_reranking: false

models:
  - name: "document"
    collection: "documents"
    default_top_k: 10
    max_top_k: 100

# Auto Mode - Intelligent Strategy Selection
reasoning:
  strategy: "auto"  # Let AI choose the best approach
  max_steps: 6
  verbose: true
  
  # Auto mode will intelligently select between:
  # - "simple": For simple queries like "What is 2+2?"
  # - "multi": For workflow queries like "Process this application"
  
  # No manual configuration needed - the AI analyzes the query
  # and selects the optimal reasoning strategy automatically
