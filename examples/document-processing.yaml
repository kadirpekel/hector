# Hector Agent - Document Processing Example
# Document ingestion and intelligent search

agent:
  name: "Document Assistant"
  description: "AI agent specialized in document processing and analysis"

# Optimized for document analysis
llm:
  name: "openai"
  api_key: "YOUR_OPENAI_API_KEY_HERE"
  model: "gpt-4o-mini"
  temperature: 0.3  # Lower temperature for factual document work

memory:
  name: "qdrant"
  host: "localhost"
  port: 6334

embedder:
  name: "ollama"
  model: "nomic-embed-text"

# Enhanced search for document retrieval
search:
  max_context_length: 3000
  context_strategy: "relevance"
  enable_reranking: true

# Document Sources
sources:
  local_docs:
    type: "local"
    path: "/path/to/your/documents"
  
  # Example S3 source (optional)
  # cloud_docs:
  #   type: "s3"
  #   bucket: "my-document-bucket"
  #   region: "us-east-1"
  #   access_key: "YOUR_ACCESS_KEY"
  #   secret_key: "YOUR_SECRET_KEY"

# Document Models with Multi-Format Support
models:
  - name: "documents"
    collection: "documents"
    default_top_k: 10
    max_top_k: 50
    
    # Multi-format document ingestion
    ingestion:
      auto_sync: false  # Manual sync via CLI commands
      sources:
        - source: "local_docs"
          pattern: "**/*.pdf"      # PDF files
        - source: "local_docs"
          pattern: "**/*.docx"     # Word documents
        - source: "local_docs"
          pattern: "**/*.txt"      # Text files
        - source: "local_docs"
          pattern: "**/*.md"       # Markdown files
        # Exclude temporary and system files
        - source: "local_docs"
          pattern: "**/*"
          exclude_patterns: 
            - "*.tmp"
            - ".*"
            - "~*"

# Simple reasoning for document queries
reasoning:
  max_iterations: 3
  enable_meta_reasoning: false
  quality_threshold: 0.7

# Usage:
# 1. Update the path in sources.local_docs.path
# 2. Run: hector --config examples/document-processing.yaml
# 3. Use commands: /sync-model documents, /search "query" documents
