# Hector Agent - Minimal Example
# Simplest possible configuration

name: "Hector Minimal"
description: "Minimal AI agent for simple tasks"

# Basic LLM Configuration
llm:
  name: "ollama"
  model: "llama3.2"
  temperature: 0.7

# Simple reasoning
reasoning:
  max_iterations: 3
  enable_meta_reasoning: false
  enable_self_reflection: false
  enable_dynamic_tools: false
  quality_threshold: 0.6