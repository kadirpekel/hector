# Hector Agent - Minimal Configuration
# Zero-configuration startup with sensible defaults

# Agent information
agent:
  name: "Hector Minimal"
  description: "AI agent with minimal configuration and automatic defaults"

# LLM Configuration (minimal - only required fields)
llm:
  name: "ollama"
  model: "llama3.2"
  # temperature: 0.7 (default)
  # max_tokens: 1000 (default)

# Memory Configuration (minimal - only required fields)
memory:
  name: "qdrant"
  collection: "hector_minimal"
  # default_top_k: 5 (default)
  # max_results: 10 (default)

# Embedder Configuration (minimal - only required fields)
embedder:
  name: "ollama"
  model: "nomic-embed-text"
  # All other settings use defaults

# Search Configuration (minimal - all defaults)
# search:
#   max_context_length: 2000 (default)
#   context_strategy: "relevance" (default)
#   enable_reranking: false (default)

# MCP Servers (minimal - basic tools)
mcp_servers:
  - name: "composio"
    url: "https://apollo.composio.dev/v3/mcp/91f6d171-bd21-4beb-a513-750e8809a5a2/mcp?user_id=hector"
    description: "Basic tools for weather and web search"

# Global instruction (minimal)
instruction: |
  You are a helpful AI assistant.

# Reasoning Configuration (minimal - single shot by default)
# reasoning:
#   strategy: "single_shot" (default)
#   max_steps: 1 (default)
#   enable_retry: false (default)